name: Test matrix
on:
  pull_request:
    branches:
      - develop
jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [14, 16]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node}}
      - name: Output ndoe version
        run: node --version
